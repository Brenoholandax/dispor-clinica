<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Clínicas - Clínica TEA</title>
  <link rel="stylesheet" href="/dispor-clinica/frontend-adm/gerenciamento-clinicas.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@400;600;700&family=Nunito:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <!-- MENU (Consistente com Dashboard) -->

  <!-- CONTEÚDO -->
  <main id="content">
    <div class="clinic-management-container">
        <div class="header-actions">
            <h1>Gerenciar Clínicas</h1>
            <button class="btn-add" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Nova Clínica
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome da Clínica</th>
                        <th>CNPJ</th>
                        <th>Status</th>
                        <th>Acessos</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="clinicasTableBody">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>
  </main>

</div>

<!-- MODAL PARA ADICIONAR CLÍNICA -->
<div id="clinicModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Adicionar Clínica</h2>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <form id="clinicForm" onsubmit="salvarClinica(event)">
            <div class="form-group">
                <label for="nomeClinica">Nome da Clínica</label>
                <input type="text" id="nomeClinica" placeholder="Ex: Clínica Esperança" required>
            </div>
            <div class="form-group">
                <label for="cnpjClinica">CNPJ</label>
                <input type="text" id="cnpjClinica" placeholder="00.000.000/0000-00" required>
            </div>
            <div class="form-group">
                <label for="statusClinica">Status Inicial</label>
                <select id="statusClinica">
                    <option value="Ativa">Ativa</option>
                    <option value="Inativa">Inativa</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Cadastrar Clínica</button>
        </form>
    </div>
</div>

<script src="/dispor-clinica/frontend-adm/gerenciamento-clinicas.js"></script>
</body>
</html>
