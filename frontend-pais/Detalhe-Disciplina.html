<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Disciplina - TEA</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos Personalizados -->
    <link rel="stylesheet" href="css/detalhe-disciplina.css">
</head>
<body>

    <a href="dashboard.html?section=inscricao" class="btn-voltar"> <!-- link que vira um bo~tao para voltar para a pagina de disciplinas -->
        <i class="fa-solid fa-arrow-left"></i> Lista de Disciplinas
    </a>

    <div class="container"> <!-- container geral da pagina -->
        <header>
            <h1 id="nomeDisciplina">Carregando...</h1> <!-- nome da disciplina, que será carregado pelo javscript -->
        </header>

        <section class="perfil-profissional"> <!-- seção que mostra o perfil do profissional responsável pela disciplina -->
            <div class="foto-perfil"> <!-- div que envolve a foto do profissional -->
                <!-- Espaço para imagem -->
                <img id="fotoProfissional" src="" alt="" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;"> <!-- imagem do profissional que vai vim via javascript-->
            </div>
            <h2 class="nome-profissional" id="nomeProfissional">---</h2> <!-- nome do profissional que vai vim via javascript -->
            <p class="especialidade" id="especialidadeProfissional">---</p> <!-- especialidade do profissional que vai vim via javascript -->
            
            <button class="btn-inscrever" onclick="irParaFormulario()">Inscrever-se</button> <!-- botão para se inscrever na disciplina, que quando clicado vai para o formulario embaixo da tela -->
        </section>

        <section class="form-section" id="inscricaoForm">
            <div id="formContainer">
                <h2 class="form-titulo"><i class="fa-solid fa-pen-to-square"></i> Formulário de Inscrição</h2>
                <p class="form-subtitulo">Preencha os dados abaixo para solicitar a inscrição na disciplina.</p>
                <form id="inscricaoFormNativo" onsubmit="enviarInscricao(event)" novalidate>
                    <div class="campo-grupo">
                        <label for="nomeResponsavel">Nome do Responsável *</label>
                        <input type="text" id="nomeResponsavel" placeholder="Seu nome completo">
                        <span class="campo-erro" id="erroNomeResponsavel"></span>
                    </div>
                    <div class="campo-grupo">
                        <label for="nomeCrianca">Nome da Criança *</label>
                        <input type="text" id="nomeCrianca" placeholder="Nome completo da criança">
                        <span class="campo-erro" id="erroNomeCrianca"></span>
                    </div>
                    <div class="campo-grupo">
                        <label for="telefone">Telefone / WhatsApp *</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                        <span class="campo-erro" id="erroTelefone"></span>
                    </div>
                    <div class="campo-grupo">
                        <label for="turno">Turno de Preferência *</label>
                        <select id="turno">
                            <option value="">Selecione...</option>
                            <option value="manha">Manhã</option>
                            <option value="tarde">Tarde</option>
                            <option value="ambos">Ambos</option>
                        </select>
                        <span class="campo-erro" id="erroTurno"></span>
                    </div>
                    <div class="campo-grupo">
                        <label for="observacoes">Observações (opcional)</label>
                        <textarea id="observacoes" rows="3" placeholder="Informações adicionais que deseja compartilhar..."></textarea>
                    </div>
                    <button type="submit" class="btn-enviar-form">
                        <i class="fa-solid fa-paper-plane"></i> Enviar Solicitação
                    </button>
                </form>
            </div>
            <div id="sucessoInscricao" style="display:none;">
                <div class="sucesso-card">
                    <div class="sucesso-icone"><i class="fa-solid fa-circle-check"></i></div>
                    <h2>Solicitação Enviada!</h2>
                    <p>Sua inscrição em <strong id="disciplinaConfirmada"></strong> foi registrada com sucesso.</p>
                    <p>Nossa equipe entrará em contato em breve para confirmar os detalhes.</p>
                    <a href="dashboard.html?section=inscricao" class="btn-inscrever" style="display:inline-block;text-decoration:none;margin-top:16px;">
                        Voltar às Disciplinas
                    </a>
                </div>
            </div>
        </section>
    </div>

    <!-- Script de Dados e Lógica -->
    <script src="js/insc-dados.js"></script>
    <script src="js/Detalhe-Disciplina.js"></script>
</body>
</html>
