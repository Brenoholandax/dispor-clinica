<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento da Clínica - ADM</title>
    <!-- Fontes e Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- CSS Exclusivo -->
    <link rel="stylesheet" href="gerenciamento.css">
</head>
<body>

    <div class="container">
        <!-- Cabeçalho com Botão de Voltar e Título Dinâmico -->
        <header class="header-gerenciamento">
            <button class="btn-back" onclick="window.location.href='clinicas-list.html'"> <!-- Botão para voltar à lista de clínicas -->
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </button>
            <h1 id="tituloClinica">Gerenciamento: Clínica...</h1> <!-- Título que será atualizado com o nome da clínica selecionada -->
        </header>

        <main id="content"> <!-- Conteúdo principal da página, onde serão exibidos os dados e ações relacionados à clínica selecionada -->
            <!-- Cards de Estatísticas -->
            <div class="stats-grid">
                <div class="card-stat"> <!-- Card para exibir o número de acessos à clínica -->
                    <div class="card-icon"><i class="fa-solid fa-users-viewfinder"></i></div> <!-- Ícone representando acessos -->
                    <div class="card-info"> <!-- Informações do card -->
                        <h3>Acessos</h3> <!-- Título do card -->
                        <p id="numAcessos">0</p> <!-- Parágrafo para exibir o número de acessos, atualizado via JavaScript -->
                    </div>
                </div>

                <div class="card-stat"> <!-- Card para exibir o número de alunos vinculados à clínica -->
                    <div class="card-icon"><i class="fa-solid fa-user-graduate"></i></div>
                    <div class="card-info">
                        <h3>Alunos</h3> <!-- Título do card -->
                        <p id="numAlunos">0</p> <!-- Parágrafo para exibir o número de alunos, atualizado via JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Informação de Próxima Cobrança -->
            <div class="billing-info-banner">
                <div class="banner-content">
                    <i class="fa-solid fa-calendar-check"></i>
                    <div>
                        <h3>Próxima Cobrança</h3> <!-- Título da seção de cobrança -->
                        <p>Seu sistema será renovado em: <strong>10/06/2026</strong></p> <!-- Informação sobre a próxima cobrança, com data destacada -->
                    </div>
                </div>
            </div>

            <!-- Seção de Boletos -->
            <div class="boletos-container">
                <h2 class="titulo-secao-boletos"><i class="fa-solid fa-file-invoice-dollar"></i> Boletos e Faturas</h2> <!-- Título da seção de boletos, com ícone representando faturas -->

                <section id="sectionBoletos" class="section-boletos"> <!-- Seção onde serão listados os boletos relacionados à clínica -->
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr> <!-- Cabeçalho da tabela de boletos, com colunas para mês referência, vencimento, valor, status e ações -->
                                    <th>Mês Referência</th>
                                    <th>Vencimento</th>
                                    <th>Valor</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="boletosTableBody"> <!-- Corpo da tabela de boletos, preenchido dinamicamente via JavaScript -->
                                <!-- Preenchido via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- JS Exclusivo -->
    <script src="gerenciamento.js"></script>
</body>
</html>
