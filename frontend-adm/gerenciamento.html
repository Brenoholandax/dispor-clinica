<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento da Clínica - ADM</title>
    <!-- Fontes e Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- CSS Exclusivo -->
    <link rel="stylesheet" href="css/gerenciamento.css">
</head>
<body>

    <div class="container">
        <!-- Cabeçalho com Botão de Voltar e Título Dinâmico -->
        <header class="header-gerenciamento">
            <button class="btn-back" onclick="window.location.href='clinicas-list.html'"> <!-- Botão para voltar à lista de clínicas -->
                <i class="fa-solid fa-arrow-left"></i> Listas de Clinicas
            </button>
            <h1 id="tituloClinica">Gerenciamento: Clínica...</h1> <!-- Título que será atualizado com o nome da clínica selecionada -->
        </header>

        <main id="content" class="is-loading"> <!-- Adicionamos a classe is-loading por padrão -->
            
            <!-- Barra de Filtros Temporais -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="periodoSelect"><i class="fa-solid fa-filter"></i> Período:</label>
                    <select id="periodoSelect" onchange="handlePeriodoChange(this.value)">
                        <option value="este-mes">Este Mês</option>
                        <option value="ultimos-3">Últimos 3 Meses</option>
                        <option value="personalizado">Personalizado</option>
                    </select>
                </div>

                <div id="customDateRange" class="filter-group">
                    <input type="date" id="dataInicio" title="Data Início">
                    <span>até</span>
                    <input type="date" id="dataFim" title="Data Fim">
                    <button class="btn-view" onclick="aplicarFiltroPersonalizado()" style="padding: 5px 10px;">OK</button>
                </div>
            </div>

            <!-- Cards de Estatísticas -->
            <div class="stats-grid">
                <div class="card-stat">
                    <!-- Placeholder de Carregamento -->
                    <div class="loading-placeholder skeleton-circle skeleton"></div>
                    <div class="loading-placeholder card-info" style="flex: 1;">
                        <div class="skeleton skeleton-text" style="width: 40%;"></div>
                        <div class="skeleton skeleton-title"></div>
                    </div>

                    <!-- Conteúdo Real -->
                    <div class="card-icon hide-on-loading"><i class="fa-solid fa-users-viewfinder"></i></div>
                    <div class="card-info hide-on-loading">
                        <h3>Acessos</h3>
                        <p id="numAcessos">0</p>
                    </div>
                </div>

                <div class="card-stat">
                    <!-- Placeholder de Carregamento -->
                    <div class="loading-placeholder skeleton-circle skeleton"></div>
                    <div class="loading-placeholder card-info" style="flex: 1;">
                        <div class="skeleton skeleton-text" style="width: 40%;"></div>
                        <div class="skeleton skeleton-title"></div>
                    </div>

                    <!-- Conteúdo Real -->
                    <div class="card-icon hide-on-loading"><i class="fa-solid fa-user-graduate"></i></div>
                    <div class="card-info hide-on-loading">
                        <h3>Alunos</h3>
                        <p id="numAlunos">0</p>
                    </div>
                </div>
            </div>

            <!-- Informação de Próxima Cobrança -->
            <div class="billing-info-banner">
                <div class="banner-content">
                    <i class="fa-solid fa-calendar-check"></i>
                    <div>
                        <h3>Próxima Cobrança</h3>
                        <p>Seu sistema será renovado em: <strong>10/06/2026</strong></p>
                    </div>
                </div>
            </div>

            <!-- Seção de Boletos -->
            <div class="boletos-container">
                <h2 class="titulo-secao-boletos"><i class="fa-solid fa-file-invoice-dollar"></i> Boletos e Faturas</h2>

                <section id="sectionBoletos" class="section-boletos">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Mês Referência</th>
                                    <th>Vencimento</th>
                                    <th>Valor</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="boletosTableBody">
                                <!-- Preenchido via JS -->
                            </tbody>
                        </table>

                        <!-- Placeholder de Carregamento da Tabela -->
                        <div class="loading-placeholder">
                            <div class="skeleton skeleton-row"></div>
                            <div class="skeleton skeleton-row"></div>
                            <div class="skeleton skeleton-row"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- JS Exclusivo -->
    <script src="js/gerenciamento.js"></script>
</body>
</html>
